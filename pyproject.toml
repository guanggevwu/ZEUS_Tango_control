	# "h5py",  # no direct imports found
	# "idna",  # likely transitive (requests)
	# "kiwisolver",  # likely transitive (matplotlib)
	# "lxml",  # no direct imports found
	"matplotlib",
	"numpy==1.26.4",
	# "packaging",  # likely transitive
