[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "zeus-tango-control"
version = "0.1.0"
description = "ZEUS Tango control utilities and GUIs"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
	# "certifi",  # likely transitive (requests)
	# "cffi",  # likely transitive
	# "charset-normalizer",  # likely transitive (requests)
